name: Pico Compile Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential \
            git

      - name: Clone Pico SDK
        run: |
          git clone https://github.com/raspberrypi/pico-sdk.git /opt/pico-sdk
          cd /opt/pico-sdk
          git submodule update --init

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DPICO_SDK_PATH=/opt/pico-sdk

      - name: Build
        run: |
          cd build
          make -j$(nproc)